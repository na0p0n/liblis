<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>書籍一覧 - Liblis</title>
    <style>
        body { background-color: #f8f9fa; }
        .book-thumb { width: 60px; height: 85px; object-fit: cover; }
        .filter-section { background-color: white; border-bottom: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div th:replace="~{common/navbar :: navbar}"></div>

<div class="filter-section py-3 mb-4 shadow-sm">
    <div class="container">
        <form class="row g-2 align-items-center" th:action="@{/books}" method="get" aria-disabled="true">
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="タイトル、著者で検索..." disabled>
            </div>
            <div class="col-md-2">
                <select class="form-select" disabled>
                    <option selected>すべてのカテゴリ</option>
                    <option>技術書</option>
                    <option>小説</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100" disabled><i class="bi bi-search me-2"></i>検索</button>
            </div>
        </form>
    </div>
</div>

<div class="container">
    <ul class="nav nav-tabs mb-4" id="bookTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#mybooks" type="button">蔵書リスト</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold" data-bs-toggle="tab" data-bs-target="#wishlist" type="button">気になる本</button>
        </li>
    </ul>

    <div class="tab-content" id="bookTabContent">
        <div class="tab-pane fade show active" id="mybooks" role="tabpanel">
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>カバー</th>
                            <th>タイトル / 著者</th>
                            <th>カテゴリ</th>
                            <th>出版社</th>
                            <th>ページ数</th>
                            <th>ISBN</th>
                            <th>登録日</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="book : ${books}">
                            <td><img th:src="${book.thumbnailUrl != null ? book.thumbnailUrl : 'https://dummy.kobeya.com/?width=60&height=85&bg=cccccc&color=000000&text=No%20Image&_=1772546481754'}" class="book-thumb rounded shadow-sm"></td>
                            <td>
                                <div class="fw-bold" th:text="${book.title}">実践Kotlin入門</div>
                                <div class="small text-muted">
                                    <span th:each="author, stat: ${book.author}"
                                          th:text="${stat.last ? author : author + ','}">
                                        リブリス太郎
                                    </span>
                                </div>
                            </td>
                            <td><span class="badge bg-info text-dark">技術書</span></td>
                            <td><span class="small text-muted" th:text="${book.publisher}">リブリス出版</span></td>
                            <td><span class="small text-muted" th:text="${book.pages}">100</span></td>
                            <td class="small text-muted" th:text="${book.isbn13 != null ? book.isbn13 : book.isbn10}">9784000000000</td>
                            <td class="small text-muted"
                                th:text="${book.publishDate?.toString() ?: ''}">2026/01/19</td>
                            <td>
                                <div class="btn-group">
                                    <!-- 所持済みなら disabled バッジ、未所持なら登録ボタン -->
                                    <span th:if="${ownedBookIds.contains(book.id)}"
                                          class="btn btn-sm btn-success disabled">
                                        <i class="bi bi-check-lg me-1"></i>登録済み
                                    </span>
                                    <button th:unless="${ownedBookIds.contains(book.id)}"
                                            type="button" class="btn btn-outline-primary btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#bookRegistrationModal"
                                            th:data-bs-book="${@jsonHelper.toJson(book)}">
                                        書庫に登録
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="wishlist" role="tabpanel">
            <div class="alert alert-info">
                気になる本をAmazonなどのリンクから登録する機能は、開発フェーズ2で実装予定です。
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div class="modal fade" id="bookRegistrationModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新規書籍登録</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="registrationForm">
                <input type="hidden" id="bookId" name="bookId">
                <input type="hidden" id="userId" name="userId" th:value="${userId}">
                <input type="hidden" name="status" value="OWNED">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="bookTitle" class="form-label">書籍タイトル <span class="badge bg-danger">必須</span></label>
                            <input type="text" class="form-control" id="bookTitle" placeholder="例：プログラミングの基礎" disabled>
                        </div>

                        <div class="col-md-6">
                            <label for="author" class="form-label">著者名</label>
                            <input type="text" class="form-control" id="author" placeholder="例：山田 太郎" disabled>
                        </div>

                        <div class="col-md-6">
                            <label for="isbn" class="form-label">ISBN</label>
                            <input type="text" class="form-control" id="isbn" placeholder="9784..." disabled>
                        </div>

                        <div class="col-md-6">
                            <label for="publisher" class="form-label">出版社</label>
                            <input type="text" class="form-control" id="publisher" placeholder="例：リブリス出版" disabled>
                        </div>

                        <div class="col-md-6">
                            <label for="publishDate" class="form-label">出版日</label>
                            <input type="date" class="form-control" id="publishDate" disabled>
                        </div>

                        <div class="col-md-6">
                            <label for="category" class="form-label">カテゴリ</label>
                            <select class="form-select" id="category" disabled>
                                <option selected>選択してください...</option>
                                <option value="1">技術書</option>
                                <option value="2">ビジネス</option>
                                <option value="3">小説</option>
                                <option value="4">その他</option>
                            </select>
                        </div>

                        <div class="col-md-6"></div>

                        <div class="col-md-6">
                            <label for="purchaseDate" class="form-label">購入日</label>
                            <input type="date" class="form-control" id="purchaseDate" required>
                        </div>

                        <div class="col-md-6">
                            <label for="purchasePrice" class="form-label small fw-bold">購入価格</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="purchasePrice">
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">書籍の概要</label>
                            <textarea class="form-control" id="description" rows="3" placeholder="本の内容や保管場所など"></textarea>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="submit" class="btn btn-primary">登録する</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
<script>
    const bookModal = document.getElementById('bookRegistrationModal');
    bookModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        const bookJson = button.getAttribute('data-bs-book');
        const book = JSON.parse(bookJson);
        const modal = this;
        console.log("bookId:" + book.id + "\n"
            + "bookTitle:" + book.title + "\n"
            + "bookAuthor:" + book.author + "\n"
            + "bookPublisher:" + book.publisher + "\n"
            + "bookPublishDate:" + book.publishDate + "\n"
            + "bookISBN:" + book.isbn13);
        modal.querySelector('#bookId').value = book.id;
        modal.querySelector('#bookTitle').value = book.title;
        modal.querySelector('#author').value = book.author;
        modal.querySelector('#isbn').value = book.isbn13;
        modal.querySelector('#publishDate').value = book.publishDate;
        modal.querySelector('#publisher').value = book.publisher;
    });
    document.getElementById('registrationForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const purchaseDateVal = document.getElementById('purchaseDate').value;
        if (!purchaseDateVal) {
            alert('購入日を入力してください');
            return;
        }
        const [year, month, day] = purchaseDateVal.split('-');

        const params = new URLSearchParams({
            bookId:        document.getElementById('bookId').value,
            userId:        document.getElementById('userId').value,
            status:        'OWNED',
            purchaseYear:  year,
            purchaseMonth: month,
            purchaseDay:   day,
            purchasePrice: document.getElementById('purchasePrice').value || '',
        });

        try {
            const res = await fetch('/api/library/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [document.querySelector('meta[name="_csrf_header"]').content]:
                        document.querySelector('meta[name="_csrf"]').content,
                },
                body: params.toString(),
            });
            if (res.ok) {
                bootstrap.Modal.getInstance(
                    document.getElementById('bookRegistrationModal')
                ).hide();
                alert('書庫に登録しました！');
                location.reload(); // 書籍一覧を更新
            } else {
                alert('登録に失敗しました。入力内容を確認してください。');
            }
        } catch (err) {
            console.error(err);
            alert('エラーが発生しました');
        }
    });
</script>
</html>
