<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${book.title} + ' - Liblis'">書籍詳細 - Liblis</title>
    <style>
        body { background-color: #f8f9fa; }
        .book-cover { width: 160px; height: 225px; object-fit: cover; }
        .status-badge { font-size: 0.95rem; }
    </style>
</head>
<body>

<div th:replace="~{common/navbar :: navbar}"></div>

<div class="container my-4">

    <!-- パンくずリスト -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>
            <li class="breadcrumb-item"><a th:href="@{/books/list}">書籍一覧</a></li>
            <li class="breadcrumb-item active" th:text="${book.title}">書籍タイトル</li>
        </ol>
    </nav>

    <!-- メインカード -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-4">

                <!-- 左カラム：書影 + 楽天リンク -->
                <div class="col-12 col-md-3 text-center">
                    <img th:src="${book.thumbnailUrl != null ? book.thumbnailUrl :
                                  (book.smallThumbnailUrl != null ? book.smallThumbnailUrl :
                                  'https://dummy.kobeya.com/?width=160&height=225&bg=cccccc&color=000000&text=No%20Image')}"
                         class="book-cover rounded shadow-sm mb-3"
                         th:alt="${book.title}">
                    <div th:if="${book.rakutenItemUrl != null}">
                        <a th:href="${book.rakutenItemUrl}"
                           target="_blank" rel="noopener noreferrer"
                           class="btn btn-danger btn-sm w-100">
                            <i class="bi bi-bag me-1"></i>楽天ブックスで見る
                        </a>
                    </div>
                </div>

                <!-- 右カラム：書籍情報 -->
                <div class="col-12 col-md-9">
                    <h2 class="fw-bold mb-1" th:text="${book.title}">タイトル</h2>
                    <p class="text-muted mb-3" th:if="${book.subTitle}" th:text="${book.subTitle}">サブタイトル</p>

                    <dl class="row mb-0">
                        <dt class="col-sm-3 text-muted fw-normal">著者</dt>
                        <dd class="col-sm-9">
                            <span th:each="author, stat : ${book.author}"
                                  th:text="${stat.last ? author : author + '、'}">著者名</span>
                        </dd>

                        <dt class="col-sm-3 text-muted fw-normal">出版社</dt>
                        <dd class="col-sm-9" th:text="${book.publisher != null ? book.publisher : '—'}">出版社</dd>

                        <dt class="col-sm-3 text-muted fw-normal">発売日</dt>
                        <dd class="col-sm-9" th:text="${book.publishDate != null ? book.publishDate : '—'}">発売日</dd>

                        <dt class="col-sm-3 text-muted fw-normal">ISBN</dt>
                        <dd class="col-sm-9" th:text="${book.isbn13 != null ? book.isbn13 : (book.isbn10 != null ? book.isbn10 : '—')}">ISBN</dd>

                        <dt class="col-sm-3 text-muted fw-normal" th:if="${book.pages != null}">ページ数</dt>
                        <dd class="col-sm-9" th:if="${book.pages != null}" th:text="${book.pages + ' ページ'}">ページ数</dd>

                        <dt class="col-sm-3 text-muted fw-normal" th:if="${book.category != null}">ジャンル</dt>
                        <dd class="col-sm-9" th:if="${book.category != null}">
                            <span class="badge bg-info text-dark" th:text="${book.category}">技術書</span>
                        </dd>
                    </dl>

                    <!-- 説明文（Bootstrap collapse） -->
                    <div class="mt-3" th:if="${book.description != null}">
                        <hr>
                        <p class="collapse mb-1" id="descCollapse" th:text="${book.description}">説明文</p>
                        <a class="btn btn-link btn-sm p-0 text-decoration-none"
                           data-bs-toggle="collapse"
                           href="#descCollapse"
                           role="button"
                           aria-expanded="false"
                           aria-controls="descCollapse">
                            <i class="bi bi-chevron-down me-1"></i>説明を読む
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 書庫ステータスカード -->
    <div class="card shadow-sm">
        <div class="card-header fw-bold">
            <i class="bi bi-bookshelf me-2"></i>書庫ステータス
        </div>
        <div class="card-body">

            <!-- 未所持 -->
            <div th:if="${userBook == null}">
                <p class="text-muted mb-3">この本はまだ書庫に登録されていません。</p>
                <button type="button"
                        class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#addBookModal">
                    <i class="bi bi-plus-lg me-1"></i>書庫に追加
                </button>
            </div>

            <!-- 所持済み -->
            <div th:if="${userBook != null}">
                <div class="mb-3">
                    <span class="badge bg-success status-badge me-2" th:text="${userBook.status}">読了</span>
                </div>
                <dl class="row mb-3">
                    <dt class="col-sm-3 text-muted fw-normal">購入日</dt>
                    <dd class="col-sm-9" th:text="${userBook.purchaseDate != null ? userBook.purchaseDate : '未設定'}">購入日</dd>

                    <dt class="col-sm-3 text-muted fw-normal">購入価格</dt>
                    <dd class="col-sm-9"
                        th:text="${userBook.purchasePrice != null ? '¥' + userBook.purchasePrice : '未設定'}">価格</dd>
                </dl>
                <div class="btn-group">
                    <button type="button"
                            class="btn btn-outline-secondary btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#editBookModal"
                            th:attr="data-user-books-id=${userBook.id},
                                     data-book-id=${book.id},
                                     data-status=${userBook.status},
                                     data-purchase-date=${userBook.purchaseDate},
                                     data-purchase-price=${userBook.purchasePrice}">
                        <i class="bi bi-pencil me-1"></i>編集
                    </button>
                    <button type="button"
                            class="btn btn-outline-danger btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteBookModal"
                            th:attr="data-user-books-id=${userBook.id}">
                        <i class="bi bi-trash me-1"></i>削除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 戻るボタン -->
    <div class="mt-4">
        <a th:href="${redirectUrl}" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i><div th:text="${redirectText}">書籍一覧に戻る</div>
        </a>
    </div>
</div>

<!-- ===== 書庫追加モーダル（未所持時） ===== -->
<div class="modal fade" id="addBookModal" tabindex="-1" aria-labelledby="addModalTitle" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addModalTitle">書庫に追加</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="addBookForm">
                <input type="hidden" id="addBookId" name="bookId" th:value="${book.id}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">書籍タイトル</label>
                        <p class="form-control-plaintext" th:text="${book.title}">タイトル</p>
                    </div>
                    <div class="mb-3">
                        <label for="addPurchaseDate" class="form-label">購入日 <span class="badge bg-danger">必須</span></label>
                        <input type="date" class="form-control" id="addPurchaseDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="addPurchasePrice" class="form-label">購入価格</label>
                        <div class="input-group">
                            <span class="input-group-text">¥</span>
                            <input type="number" class="form-control" id="addPurchasePrice" min="0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="submit" class="btn btn-primary">登録する</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== 編集モーダル（所持済み時） ===== -->
<div class="modal fade" id="editBookModal" tabindex="-1" aria-labelledby="editModalTitle" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editModalTitle">蔵書を編集</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editBookForm">
                <input type="hidden" id="editUserBooksId">
                <input type="hidden" id="editBookId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editStatus" class="form-label">読書ステータス</label>
                        <select class="form-select" id="editStatus">
                            <option value="OWNED">所持中</option>
                            <option value="READING">読書中</option>
                            <option value="READ">読了</option>
                            <option value="WISHLIST">積読</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editPurchaseDate" class="form-label">購入日</label>
                        <input type="date" class="form-control" id="editPurchaseDate">
                    </div>
                    <div class="mb-3">
                        <label for="editPurchasePrice" class="form-label">購入価格</label>
                        <div class="input-group">
                            <span class="input-group-text">¥</span>
                            <input type="number" class="form-control" id="editPurchasePrice" min="0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="submit" class="btn btn-primary">更新する</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== 削除確認モーダル ===== -->
<div class="modal fade" id="deleteBookModal" tabindex="-1" aria-labelledby="deleteModalTitle" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="deleteModalTitle">書庫から削除</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>この本を書庫から削除してもよいですか？</p>
                <p class="text-muted small">※書籍データ自体は削除されません。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                <button type="button" class="btn btn-danger" id="deleteConfirmBtn">削除する</button>
            </div>
        </div>
    </div>
</div>

<!-- 共通フッター -->
<div th:replace="~{common/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const csrfToken  = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    // ===== 説明文の「続きを読む」ラベル切替 =====
    const descCollapse = document.getElementById('descCollapse');
    if (descCollapse) {
        descCollapse.addEventListener('show.bs.collapse', () => {
            document.querySelector('[data-bs-target="#descCollapse"]').innerHTML =
                '<i class="bi bi-chevron-up me-1"></i>閉じる';
        });
        descCollapse.addEventListener('hide.bs.collapse', () => {
            document.querySelector('[data-bs-target="#descCollapse"]').innerHTML =
                '<i class="bi bi-chevron-down me-1"></i>説明を読む';
        });
    }

    // ===== 書庫追加フォーム =====
    const addBookForm = document.getElementById('addBookForm');
    if (addBookForm) {
        addBookForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const purchaseDateVal = document.getElementById('addPurchaseDate').value;
            if (!purchaseDateVal) {
                alert('購入日を入力してください');
                return;
            }
            const [year, month, day] = purchaseDateVal.split('-');
            const params = new URLSearchParams({
                bookId:        document.getElementById('addBookId').value,
                status:        'OWNED',
                purchaseYear:  year,
                purchaseMonth: month,
                purchaseDay:   day,
                purchasePrice: document.getElementById('addPurchasePrice').value || '',
            });
            try {
                const res = await fetch('/api/library/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        [csrfHeader]: csrfToken,
                    },
                    body: params.toString(),
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addBookModal')).hide();
                    alert('書庫に登録しました！');
                    location.reload();
                } else {
                    alert('登録に失敗しました。');
                }
            } catch (err) {
                console.error(err);
                alert('エラーが発生しました');
            }
        });
    }

    // ===== 編集モーダル：既存データをセット =====
    const editModal = document.getElementById('editBookModal');
    if (editModal) {
        editModal.addEventListener('show.bs.modal', function (event) {
            const btn = event.relatedTarget;
            document.getElementById('editUserBooksId').value   = btn.dataset.userBooksId;
            document.getElementById('editBookId').value   = btn.dataset.bookId;
            document.getElementById('editStatus').value        = btn.dataset.status || 'OWNED';
            document.getElementById('editPurchaseDate').value  = btn.dataset.purchaseDate || '';
            document.getElementById('editPurchasePrice').value = btn.dataset.purchasePrice || '';
        });
        document.getElementById('editBookForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const userBooksId     = document.getElementById('editUserBooksId').value;
            const params = new URLSearchParams({
                bookId:        document.getElementById('editBookId').value,
                status:        document.getElementById('editStatus').value,
                purchasePrice: document.getElementById('editPurchasePrice').value || '',
                purchaseDate:  document.getElementById('editPurchaseDate').value,
            });
            try {
                const res = await fetch(`/api/library/${userBooksId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        [csrfHeader]: csrfToken,
                    },
                    body: params.toString(),
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(editModal).hide();
                    alert('更新しました！');
                    location.reload();
                } else if (res.status === 403) {
                    alert('この操作は許可されていません。');
                } else {
                    alert('更新に失敗しました。');
                }
            } catch (err) {
                console.error(err);
                alert('エラーが発生しました');
            }
        });
    }

    // ===== 削除モーダル =====
    const deleteModal = document.getElementById('deleteBookModal');
    let deleteUserBooksId = null;
    if (deleteModal) {
        deleteModal.addEventListener('show.bs.modal', function (event) {
            deleteUserBooksId = event.relatedTarget.dataset.userBooksId;
        });
        document.getElementById('deleteConfirmBtn').addEventListener('click', async function () {
            if (!deleteUserBooksId) return;
            try {
                const res = await fetch(`/api/library/${deleteUserBooksId}`, {
                    method: 'DELETE',
                    headers: { [csrfHeader]: csrfToken },
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(deleteModal).hide();
                    alert('書庫から削除しました。');
                    location.reload();
                } else if (res.status === 403) {
                    alert('この操作は許可されていません。');
                } else {
                    alert('削除に失敗しました。');
                }
            } catch (err) {
                console.error(err);
                alert('エラーが発生しました');
            }
        });
    }
</script>
</body>
</html>
