<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liblis - 書籍登録モーダル</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8f9fa; }
        .modal-header { background-color: #0d6efd; color: white; }
        .btn-close-white { filter: invert(1) grayscale(100%) brightness(200%); }
    </style>
</head>
<body>

<button type="button" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#bookRegistrationModal">
    新刊を登録する
</button>

<div class="modal fade" id="bookRegistrationModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新規書籍登録</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="registrationForm">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="bookTitle" class="form-label">書籍タイトル <span class="badge bg-danger">必須</span></label>
                            <input type="text" class="form-control" id="bookTitle" placeholder="例：プログラミングの基礎" required>
                        </div>

                        <div class="col-md-6">
                            <label for="author" class="form-label">著者名</label>
                            <input type="text" class="form-control" id="author" placeholder="例：山田 太郎">
                        </div>

                        <div class="col-md-6">
                            <label for="isbn" class="form-label">ISBN</label>
                            <input type="text" class="form-control" id="isbn" placeholder="978-4-...">
                        </div>

                        <div class="col-md-6">
                            <label for="publisher" class="form-label">出版社</label>
                            <input type="text" class="form-control" id="publisher" placeholder="例：リブリス出版">
                        </div>

                        <div class="col-md-6">
                            <label for="publishDate" class="form-label">出版日</label>
                            <input type="date" class="form-control" id="publishDate">
                        </div>

                        <div class="col-md-6">
                            <label for="category" class="form-label">カテゴリ</label>
                            <select class="form-select" id="category">
                                <option selected>選択してください...</option>
                                <option value="1">技術書</option>
                                <option value="2">ビジネス</option>
                                <option value="3">小説</option>
                                <option value="4">その他</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">書籍の概要</label>
                            <textarea class="form-control" id="description" rows="3" placeholder="本の内容や保管場所など"></textarea>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="submit" class="btn btn-primary">登録する</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // フォーム送信時の処理（デモ用）
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('書籍を登録しました！');
        // ここにサーバーサイドへの送信処理（fetchなど）を記述します。
        const modal = bootstrap.Modal.getInstance(document.getElementById('bookRegistrationModal'));
        modal.hide();
    });
</script>

</body>
</html>
