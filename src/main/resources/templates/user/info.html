<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>アカウント設定 - Liblis</title>
    <style>
        body { background-color: #f8f9fa; }
        .settings-card { max-width: 600px; margin: 2rem auto; }
        @media (min-width: 576px) {
            .account-action-btn { width: auto !important; }
        }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{common/navbar :: navbar}"></div>
<div class="container">
    <div class="card shadow-sm settings-card">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold">アカウント設定</h5>
        </div>
        <div class="card-body p-4">

            <section class="mb-4">
                <h6 class="fw-bold mb-3">プロフィール</h6>
                <div class="mb-3">
                    <label class="form-label text-muted small mb-0">表示名</label>
                    <div class="fw-bold" th:text="${user.displayName}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small mb-0">メールアドレス</label>
                    <div class="fw-bold" th:text="${user.mailAddress}"></div>
                </div>
            </section>

            <hr class="my-4">

            <section>
                <h6 class="fw-bold mb-3">外部サービス連携</h6>

                <div class="d-flex align-items-center justify-content-between mb-3 p-3 border rounded flex-wrap gap-2">
                    <div>
                        <span class="fw-bold">Google</span>
                        <div class="small text-muted" th:text="${user.isGoogleLinked ? '連携済み' : '未連携'}"></div>
                    </div>
                    <div>
                        <a th:if="${!user.isGoogleLinked}" th:href="@{/oauth2/authorization/google}" class="btn btn-outline-primary btn-sm">連携する</a>
                        <form th:action="@{/user/unlink/google}" method="post" onsubmit="return confirm('Google連携を解除しますか？');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button th:if="${user.isGoogleLinked}" type="submit" class="btn btn-outline-danger btn-sm">連携解除</button>
                        </form>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between mb-3 p-3 border rounded flex-wrap gap-2">
                    <div>
                        <span class="fw-bold">GitHub</span>
                        <div class="small text-muted" th:text="${user.isGithubLinked ? '連携済み' : '未連携'}"></div>
                    </div>
                    <div>
                        <a th:if="${!user.isGithubLinked}" th:href="@{/oauth2/authorization/github}" class="btn btn-outline-dark btn-sm">連携する</a>
                        <form th:action="@{/user/unlink/github}" method="post" onsubmit="return confirm('Github連携を解除しますか？');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button th:if="${user.isGithubLinked}" type="submit" class="btn btn-outline-danger btn-sm">連携解除</button>
                        </form>
                    </div>
                </div>
            </section>

        </div>

        <!-- 下部ボタンエリア -->
        <div class="card-footer bg-white py-3 px-4">
            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-stretch align-items-sm-center gap-2">
                <div>
                    <button th:if="${hasPassword}" type="button"
                            class="btn btn-outline-secondary w-100 account-action-btn"
                            data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                        🔑 パスワードを変更する
                    </button>
                </div>
                <div>
                    <button type="button" class="btn btn-outline-danger w-100 account-action-btn"
                            data-bs-toggle="modal" data-bs-target="#deleteAccountModal">
                        アカウントを削除する
                    </button>
                </div>
            </div>
            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-decoration-none small">ホームに戻る</a>
            </div>
        </div>
    </div>
</div>

<!-- パスワード変更モーダル -->
<div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">🔑 パスワード変更</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div th:if="${param.passwordChanged}" class="alert alert-success">
                    パスワードを変更しました。
                </div>
                <div th:if="${param.passwordError == 'wrongCurrent'}" class="alert alert-danger">
                    現在のパスワードが正しくありません。
                </div>
                <div th:if="${param.passwordError == 'mismatch'}" class="alert alert-danger">
                    新しいパスワードと確認用パスワードが一致しません。
                </div>
                <div th:if="${param.passwordError == 'validation'}" class="alert alert-danger">
                    パスワードは英大文字・小文字・数字・記号をそれぞれ1文字以上含む必要があります。
                </div>
                <form th:action="@{/user/change-password}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label">現在のパスワード</label>
                        <input type="password" name="currentPassword" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新しいパスワード</label>
                        <input type="password" name="newPassword" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新しいパスワード（確認）</label>
                        <input type="password" name="confirmPassword" class="form-control" required/>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <button type="submit" class="btn btn-primary">パスワードを変更する</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- アカウント削除モーダル -->
<div class="modal fade" id="deleteAccountModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">アカウントの削除</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>この操作は<strong>取り消せません</strong>。</p>
                <p>あなたの書庫データもすべて削除されます。</p>
                <p>続けるには「<strong>削除する</strong>」と入力してください。</p>
                <input type="text" id="deleteConfirmInput" class="form-control" placeholder="削除する">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                <form th:action="@{/user/delete}" method="post">
                    <input type="hidden" name="_method" value="DELETE">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" id="deleteSubmitBtn" class="btn btn-danger" disabled>
                        アカウントを削除する
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script>
    // アカウント削除: 確認文字入力チェック
    document.getElementById('deleteConfirmInput').addEventListener('input', function() {
        document.getElementById('deleteSubmitBtn').disabled = this.value !== '削除する';
    });

    // パスワード変更後リダイレクト時にモーダルを自動オープン（PRGパターン対応）
    (function() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('passwordChanged') || params.has('passwordError')) {
            const modal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
            modal.show();
        }
    })();
</script>

<!-- 共通フッター -->
<div th:replace="~{common/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
