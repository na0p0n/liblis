<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>500 - サーバーエラー | liblis</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- 共通ヘッダー -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- メインコンテンツ -->
<main class="flex-grow-1 d-flex align-items-center bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <!-- エラーコード -->
                <p class="display-1 fw-bold text-warning mb-0">500</p>
                <!-- アイコン -->
                <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
                <!-- メッセージ -->
                <h1 class="h3 mt-3">サーバーエラーが発生しました</h1>
                <p class="text-muted mt-2">
                    申し訳ありません。一時的なエラーが発生しています。<br>
                    しばらく時間をおいてから再度お試しください。
                </p>
                <!-- アクションボタン -->
                <div class="mt-4 d-flex gap-2 justify-content-center">
                    <a th:href="@{/}" class="btn btn-primary">
                        <i class="bi bi-house-door me-1"></i>トップページへ戻る
                    </a>
                    <button onclick="location.reload()" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise me-1"></i>再読み込み
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 共通フッター -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
