name: Kotlin CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. 静的解析 (detekt)
      # ※ build.gradle.kts に detekt プラグインの設定が必要です
      - name: Run Static Analysis (detekt)
        run: ./gradlew detekt

      # 2. テストの実行
      - name: Run Tests
        run: ./gradlew test

      # 3. ビルド (JARファイルの生成確認)
      # テストは上で通っているので、ここではスキップして時間を短縮します
      - name: Build with Gradle
        run: ./gradlew build -x test

      # (任意) ビルド成果物(JAR)をArtifactsとして保存
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 5
