name: Kotlin CI with Gradle

on:
  push:
    branches:
    - '*'
  pull_request:
    branches: 
    - '*'

permissions:
  contents: read
      
jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: liblis_db
          POSTGRES_USER: liblis
          POSTGRES_PASSWORD: liblis
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. 静的解析 (detekt)
      # ※ build.gradle.kts に detekt プラグインの設定が必要です
      - name: Run Static Analysis (detekt)
        run: ./gradlew detekt

      # 2. テストの実行
      - name: Run Tests
        run: ./gradlew test

      # 3. ビルド (JARファイルの生成確認)
      # テストは上で通っているので、ここではスキップして時間を短縮します
      - name: Build with Gradle
        run: ./gradlew build -x test

      # (任意) ビルド成果物(JAR)をArtifactsとして保存
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 5
